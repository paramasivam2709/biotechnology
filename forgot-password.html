<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StacklyForgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background: linear-gradient(135deg,#e0f2fe,#f0f9ff,#ffffff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.glass{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.5);
}

.input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e2e8f0;
outline:none;
}

.input:focus{
border-color:#0ea5e9;
box-shadow:0 0 0 2px #bae6fd;
}

</style>

</head>

<body>


<div class="glass p-10 rounded-3xl shadow-xl w-full max-w-md">

<div class="text-center mb-6">

<h2 class="text-3xl font-bold text-sky-600">Stackly</h2>

<p class="text-gray-500 text-sm">Reset Your Password</p>

</div>


<!-- success message -->

<div id="successMsg"
class="hidden bg-green-100 text-green-700 p-3 rounded-lg text-center mb-4">

Password reset link sent! Redirecting to login...

</div>


<form id="forgotForm">

<label class="text-sm font-medium text-gray-600">Email Address</label>

<input
type="email"
placeholder="Enter your registered email"
class="input mt-2 mb-6"
required>


<button
type="submit"
class="w-full bg-sky-600 text-white py-3 rounded-full font-semibold hover:bg-sky-700 transition">

Send Reset Link

</button>

</form>


<!-- login link -->

<div class="text-center mt-6">

<a href="login.html"
class="text-sky-600 font-semibold">

Back to Login

</a>

</div>


<!-- back home -->

<div class="text-center mt-4">

<a href="index.html"
class="text-gray-500 text-sm hover:text-sky-600">

← Back to Home

</a>

</div>


</div>


<script>

document.getElementById("forgotForm").addEventListener("submit",function(e){

e.preventDefault()

document.getElementById("successMsg").classList.remove("hidden")

setTimeout(function(){

window.location="login.html"

},2000)

})

</script>


</body>
</html>
