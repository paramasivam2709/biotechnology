<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StacklyForgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background: linear-gradient(135deg,#e0f2fe,#f0f9ff,#ffffff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.glass{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.5);
}

.input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e2e8f0;
outline:none;
}

.input:focus{
border-color:#0ea5e9;
box-shadow:0 0 0 2px #bae6fd;
}

</style>

</head>

<body>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" id="navbar">
        <div class="glass mx-4 mt-4 rounded-full px-6 py-4 flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-2 cursor-pointer magnetic-btn" id="logo">

           <img src="img/logo.webp" 
           alt="Stackly Logo" 
           class="w-40 h-15 object-contain">

           </div>

            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="nav-link text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">Home</a>
                <a href="about.html" class="nav-link text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">About</a>
                <a href="services.html" class="nav-link text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">Services</a>
                <a href="career.html" class="nav-link text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">Career</a>
                <a href="contact.html" class="nav-link text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">Contact</a>
            </div>

            <div class="flex items-center gap-4">
                <button class="md:hidden magnetic-btn p-2 rounded-full hover:bg-slate-100 transition-all" id="mobile-menu-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <a href="login.html"><button class="magnetic-btn bg-slate-900 text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-slate-800 transition-all flex items-center gap-2 group">
                    sign in
                    <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                    </svg>
                </button></a>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"></div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed top-0 right-0 h-full w-80 glass z-50 transform translate-x-full transition-transform duration-300">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-2">
                    <img src="img/logo.webp" alt="Stackly Logo" class="w-32 h-10 object-contain">
                </div>
                <button class="magnetic-btn p-2 rounded-full hover:bg-slate-100 transition-all" id="mobile-menu-close">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="space-y-6">
                <a href="index.html" class="block text-lg font-medium text-slate-600 hover:text-slate-900 transition-colors">Home</a>
                <a href="about.html" class="block text-lg font-medium text-slate-600 hover:text-slate-900 transition-colors">About</a>
                <a href="services.html" class="block text-lg font-medium text-slate-600 hover:text-slate-900 transition-colors">Services</a>
                <a href="career.html" class="block text-lg font-medium text-slate-600 hover:text-slate-900 transition-colors">Career</a>
                <a href="contact.html" class="block text-lg font-medium text-slate-600 hover:text-slate-900 transition-colors">Contact</a>
            </div>
            <div class="mt-8 pt-8 border-t border-slate-200">
                <a href="login.html"><button class="w-full magnetic-btn bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-medium hover:bg-slate-800 transition-all flex items-center justify-center gap-2 group">
                    sign in
                    <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                    </svg>
                </button></a>
            </div>
        </div>
    </div>


<div class="glass p-10 rounded-3xl shadow-xl w-full max-w-md">

<div class="text-center mb-6">

<h2 class="text-3xl font-bold text-sky-600">Stackly</h2>

<p class="text-gray-500 text-sm">Reset Your Password</p>

</div>


<!-- success message -->

<div id="successMsg"
class="hidden bg-green-100 text-green-700 p-3 rounded-lg text-center mb-4">

Password reset link sent! Redirecting to login...

</div>


<form id="forgotForm">

<label class="text-sm font-medium text-gray-600">Email Address</label>

<input
type="email"
placeholder="Enter your registered email"
class="input mt-2 mb-6"
required>


<button
type="submit"
class="w-full bg-sky-600 text-white py-3 rounded-full font-semibold hover:bg-sky-700 transition">

Send Reset Link

</button>

</form>


<!-- login link -->

<div class="text-center mt-6">

<a href="login.html"
class="text-sky-600 font-semibold">

Back to Login

</a>

</div>


<!-- back home -->

<div class="text-center mt-4">

<a href="index.html"
class="text-gray-500 text-sm hover:text-sky-600">

← Back to Home

</a>

</div>


</div>


<script>

document.getElementById("forgotForm").addEventListener("submit",function(e){

e.preventDefault()

document.getElementById("successMsg").classList.remove("hidden")

setTimeout(function(){

window.location="login.html"

},2000)

})

</script>

<script>
// Mobile Menu Toggle
const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const mobileMenuClose = document.getElementById('mobile-menu-close');
const mobileMenu = document.getElementById('mobile-menu');
const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');

function openMobileMenu() {
    mobileMenu.classList.remove('translate-x-full');
    mobileMenuOverlay.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeMobileMenu() {
    mobileMenu.classList.add('translate-x-full');
    mobileMenuOverlay.classList.add('hidden');
    document.body.style.overflow = '';
}

mobileMenuBtn.addEventListener('click', openMobileMenu);
mobileMenuClose.addEventListener('click', closeMobileMenu);
mobileMenuOverlay.addEventListener('click', closeMobileMenu);
</script>

</body>
</html>
