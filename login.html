<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StacklyLogin</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background: linear-gradient(135deg,#e0f2fe,#f0f9ff,#ffffff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.glass{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.5);
}

.input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e2e8f0;
outline:none;
}

.input:focus{
border-color:#0ea5e9;
box-shadow:0 0 0 2px #bae6fd;
}

</style>

</head>

<body>

<div class="glass p-10 rounded-3xl shadow-xl w-full max-w-md">

<!-- logo -->

<div class="text-center mb-6">

<h2 class="text-3xl font-bold text-sky-600">Stackly</h2>

<p class="text-gray-500 text-sm">Medical Portal Login</p>

</div>

<form id="loginForm">

<!-- role -->

<label class="text-sm font-medium text-gray-600">Login As</label>

<select id="role" class="input mt-2 mb-4">

<option value="admin">Administrator</option>

<option value="patient">Patient</option>

<option value="researcher">Researcher</option>

</select>


<!-- email -->

<label class="text-sm font-medium text-gray-600">Email</label>

<input type="email" placeholder="Enter Email" class="input mt-2 mb-4" required>


<!-- password -->

<label class="text-sm font-medium text-gray-600">Password</label>

<div class="relative mt-2 mb-4">

<input type="password" id="password" class="input pr-10" required>

<button type="button"
onclick="togglePassword()"
class="absolute right-3 top-3 text-gray-400">

👁

</button>

</div>


<!-- forgot password -->

<div class="text-right mb-6">

<a href="forgot-password.html"
class="text-sm text-sky-600 hover:underline">

Forgot Password?

</a>

</div>


<!-- login button -->

<button
type="submit"
class="w-full bg-sky-600 text-white py-3 rounded-full font-semibold hover:bg-sky-700 transition">

Login

</button>

</form>


<!-- signup -->

<div class="text-center mt-6">

<p class="text-sm text-gray-500">

Don't have account?

<a href="register.html"
class="text-sky-600 font-semibold">

Sign Up

</a>

</p>

</div>


<!-- back -->

<div class="text-center mt-4">

<a href="index.html"
class="text-gray-500 text-sm hover:text-sky-600">

← Back to Home

</a>

</div>

</div>


<script>

/* password toggle */

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}
else{
pass.type="password";
}

}


/* login redirect */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

let role=document.getElementById("role").value

if(role==="admin"){

window.location="admin-dashboard.html"

}

else if(role==="patient"){

window.location="patient-dashboard.html"

}

else if(role==="researcher"){

window.location="researcher-dashboard.html"

}

})

</script>


</body>
</html>
