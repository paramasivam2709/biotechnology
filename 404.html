<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background: linear-gradient(135deg,#e0f2fe,#f0f9ff,#ffffff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* glass card */

.glass{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.5);
}

/* floating animation */

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.animate-float{
animation:float 4s ease-in-out infinite;
}

</style>

</head>

<body>


<div class="glass p-10 rounded-3xl shadow-xl text-center max-w-md w-full">

<!-- 404 text -->

<h1 class="text-7xl font-bold text-sky-600 animate-float">404</h1>

<p class="text-xl text-gray-600 mt-4">Oops! Page not found</p>

<p class="text-gray-500 text-sm mt-2">
The page you are looking for doesn’t exist or has been moved.
</p>


<!-- buttons -->

<div class="mt-8 flex flex-col gap-4">

<!-- back button -->

<button onclick="goBack()"
class="bg-sky-600 text-white py-3 rounded-full font-semibold hover:bg-sky-700 transition">

← Go Back

</button>

<!-- home button -->

<a href="index.html"
class="border border-sky-600 text-sky-600 py-3 rounded-full font-semibold hover:bg-sky-50 transition">

Go to Home

</a>

</div>

</div>


<script>

/* back button */

function goBack(){
window.history.back()
}

</script>


</body>
</html>
